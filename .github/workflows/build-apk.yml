name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # Download gradle-wrapper.jar using gradle itself (most reliable method)
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p android/gradle/wrapper
          # Use gradle to generate its own wrapper jar - most reliable approach
          cd android
          # Install gradle CLI temporarily to generate wrapper
          curl -s "https://get.sdkman.io" | bash 2>/dev/null || true
          source "$HOME/.sdkman/bin/sdkman-init.sh" 2>/dev/null || true
          # Direct download from Maven Central - most reliable source
          GRADLE_VERSION="8.6"
          JAR_URL="https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/${GRADLE_VERSION}/gradle-wrapper-${GRADLE_VERSION}.jar"
          curl -fsSL "$JAR_URL" -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          # Fallback 1: GitHub releases
          curl -fsSL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          # Fallback 2: use gradle wrapper task with system gradle
          (apt-get install -y gradle -q 2>/dev/null && gradle wrapper --gradle-version $GRADLE_VERSION --project-dir . 2>/dev/null) || \
          # Fallback 3: download via wget from services.gradle.org zip
          (wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip && \
           unzip -p /tmp/gradle.zip "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-*.jar" > gradle/wrapper/gradle-wrapper.jar 2>/dev/null) || true
          ls -la gradle/wrapper/
          cd ..

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CalcPro,OU=Dev,O=CalcPro,L=Ahmedabad,S=Gujarat,C=IN"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Stage APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK found: $APK"
          cp "$APK" CalcPro-latest.apk
          mkdir -p web/downloads
          cp CalcPro-latest.apk web/downloads/OdooPricingStudio-latest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalcPro-APK
          path: CalcPro-latest.apk
          retention-days: 30

      - name: Commit APK to web/downloads
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update APK build [skip ci]"
          file_pattern: web/downloads/*.apk
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: CalcPro-APK
          path: ./apk-out

      - name: Get build metadata
        id: meta
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ steps.meta.outputs.sha }}
          name: "CalcPro APK · ${{ steps.meta.outputs.date }}"
          body: |
            ## 📱 CalcPro — Odoo Pricing Studio
            Auto-built from commit `${{ github.sha }}`
            ### ⬇️ Install
            1. Download CalcPro-latest.apk below
            2. Android: Settings → Security → Install unknown apps → enable
            3. Tap APK → Install
          files: ./apk-out/CalcPro-latest.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
