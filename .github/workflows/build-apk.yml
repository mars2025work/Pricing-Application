name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Node 20 ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install JS dependencies ───────────────────────────────────────
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # ── 6. Download gradle-wrapper.jar ───────────────────────────────────
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL \
            "https://github.com/nicoulaj/gradle-wrapper/raw/master/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
          echo "✅ gradle-wrapper.jar downloaded ($(du -sh android/gradle/wrapper/gradle-wrapper.jar | cut -f1))"

      # ── 7. Ensure gradlew is executable ─────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 8. Generate debug keystore for signing ───────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=CalcPro,OU=Dev,O=CalcPro,L=Ahmedabad,S=Gujarat,C=IN"
          echo "✅ Keystore generated"

      # ── 9. Write local.properties ────────────────────────────────────────
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "✅ local.properties written: sdk.dir=$ANDROID_HOME"

      # ── 10. Cache Gradle ─────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 11. Build Release APK ────────────────────────────────────────────
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Stage APK ────────────────────────────────────────────────────
      - name: Stage APK for upload
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "✅ APK: $APK ($(du -sh "$APK" | cut -f1))"
          cp "$APK" CalcPro-latest.apk
          mkdir -p web/downloads
          cp CalcPro-latest.apk web/downloads/OdooPricingStudio-latest.apk

      # ── 13. Upload as workflow artifact ──────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CalcPro-APK
          path: CalcPro-latest.apk
          retention-days: 30

      # ── 14. Commit APK to repo so Cloudflare Pages can serve it ─────────
      - name: Commit APK to web/downloads
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update APK build [skip ci]"
          file_pattern: web/downloads/*.apk
          branch: main

  # ── Create GitHub Release with APK attached ──────────────────────────────
  release:
    name: Create GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: CalcPro-APK
          path: ./apk-out

      - name: Get build metadata
        id: meta
        run: |
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ steps.meta.outputs.sha }}
          name: "CalcPro APK · ${{ steps.meta.outputs.date }}"
          body: |
            ## 📱 CalcPro — Odoo Pricing Studio
            Auto-built from commit `${{ github.sha }}`

            ### ⬇️ How to Install
            1. Download `CalcPro-latest.apk` below
            2. On Android go to **Settings → Security → Install unknown apps** and enable for your browser
            3. Open the downloaded APK and tap **Install**

            ### ✅ App Features
            - 📋 Multi-Year License Calculator (1–5 years)
            - ⚖️ Yearly vs Monthly Plan Comparison
            - 👔 HR Plans Calculator
            - 🛠️ Success Pack / Implementation Pricing
            - 🎯 Sales Analysis with MRR/NRR Targets

            > React Native 0.73 · Android 8.0+ · GST 18% · India Edition
          files: ./apk-out/CalcPro-latest.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
