apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   root = file("../")
    //   reactNativeDir = file("../node_modules/react-native")
    //   codegenDir = file("../node_modules/@react-native/codegen")
    //   cliFile = file("../node_modules/react-native/cli.js")

    /* Bundling */
    //   bundleAssetName = "index.android.bundle"
    //   entryFile = file("../index.js")
    //   enableHermes = true  // ← Hermes is enabled by default

    /* Signing */
    //   keystorePath = file("release.keystore")
    //   keyAlias = "calcpro"
    //   storePassword = System.getenv("MYAPP_UPLOAD_STORE_PASSWORD")
    //   keyPassword  = System.getenv("MYAPP_UPLOAD_KEY_PASSWORD")
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.calcpro.mobileapplication"

    defaultConfig {
        applicationId "com.calcpro.mobileapplication"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        // Uncomment for production signing with GitHub Secrets:
        // release {
        //     storeFile file(MYAPP_UPLOAD_STORE_FILE)
        //     storePassword MYAPP_UPLOAD_STORE_PASSWORD
        //     keyAlias MYAPP_UPLOAD_KEY_ALIAS
        //     keyPassword MYAPP_UPLOAD_KEY_PASSWORD
        // }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug   // ← uses debug keystore for now (safe for sideloading)
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}
